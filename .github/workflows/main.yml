name: Build Telegram APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Modify Audio Code
        run: |
          # கம்ப்யூட்டரே தேடி உங்கள் ஆடியோ மாற்றங்களைச் செய்யும்
          find . -name "MediaController.java" -exec sed -i 's/AudioSource.MIC/AudioSource.VOICE_COMMUNICATION/g' {} +
          find . -name "MediaController.java" -exec sed -i 's/noiseSuppression = true/noiseSuppression = false/g' {} +
          find . -name "MediaController.java" -exec sed -i 's/echoCancellation = true/echoCancellation = false/g' {} +

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew
          # ஒரு மெயின் யுனிவர்சல் ஆப்பை மட்டும் உருவாக்க
          ./gradlew assembleDebug -PgenerateUniversalApk=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Universal-Audio-App
          path: "**/*universal.apk"
          
